<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Société I-Tech | Système d'alarme</title>
    <style>
        /* كود التصميم الأساسي */
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column; /* ترتيب العناصر عمودياً */
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        /* تنسيق البطاقة العلوية */
        .card {
            background-color: white;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-bottom: 5px solid #12a5b8;
            margin-bottom: 50px;
        }

        .icon-box {
            color: #12a5b8;
            font-size: 50px;
            margin-bottom: 15px;
        }

        h2 {
            margin: 0;
            font-size: 24px;
            color: #333;
        }

        .description {
            color: #777;
            font-size: 18px;
            margin: 15px 0 30px 0;
            direction: rtl;
        }

        /* تنسيق الزر - بحال Système incendie تماماً */
        .btn-action {
            display: inline-block;
            background-color: #12a5b8;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            width: 80%;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn-action:hover {
            background-color: #0e8a9a;
            transform: translateY(-2px);
        }

        /* تنسيق معرض الصور */
        .gallery-section {
            width: 100%;
            max-width: 1000px;
            text-align: center;
        }

        .gallery-section h3 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 22px;
            position: relative;
            padding-bottom: 10px;
        }

        .gallery-section h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background-color: #12a5b8;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 10px;
        }

        .gallery-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* باش التصويرة متخسرش */
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .gallery-grid img:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(18, 165, 184, 0.3);
        }

        /* تحسينات للشاشات الصغيرة */
        @media (max-width: 600px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-box">🔔</div>
        <h2>Système d'alarme</h2>
        <p class="description">أنظمة الحماية المتكاملة والإنذار</p>
        <a href="#" class="btn-action">En savoir plus</a>
    </div>

    <div class="gallery-section">
        <h3>معرض الصور</h3>
        <div class="gallery-grid">
            <img src="alarme1.jpg" alt="Installation 1">
            <img src="alarme2.jpg" alt="Installation 2">
            <img src="alarme3.jpg" alt="Installation 3">
            <img src="alarme4.jpg" alt="Installation 4">
            <img src="alarme5.jpg" alt="Installation 5">
        </div>
    </div>

</body>
</html>
