<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système d'alarme</title>
    <style>
        /* كود التصميم CSS */
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: white;
            width: 380px;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border-bottom: 5px solid #12a5b8; /* الشريط السفلي */
        }

        .icon-box {
            color: #2c3e50;
            font-size: 50px;
            margin-bottom: 15px;
        }

        h2 {
            margin: 0;
            font-size: 24px;
            color: #333;
            font-weight: 500;
        }

        .description {
            color: #777;
            font-size: 18px;
            margin: 15px 0 30px 0;
            direction: rtl; /* باش العربية تجي مقادة من اليمين */
        }

        .btn {
            display: inline-block;
            background-color: #12a5b8;
            color: white;
            text-decoration: none;
            padding: 12px 0;
            width: 90%;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #0e8a9a;
        }

        /* تحسينات للشاشات الصغيرة */
        @media (max-width: 400px) {
            .card {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-box">🔔</div>
        
        <h2>Système d'alarme</h2>
        
        <p class="description">أنظمة الحماية المتكاملة والإنذار</p>
        
        <a href="#" class="btn">En savoir plus</a>
    </div>

</body>
</html>
