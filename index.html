<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Societe I-Tech</title>
    <style>
        /* CSS باش نزوقو الموقع */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; text-align: center; background-color: #f4f4f9; }
        header { background: #2c3e50; color: white; padding: 2rem; }
        .container { padding: 2rem; }
        .btn { background: #3498db; color: white; padding: 10px 20px; border: none; cursor: pointer; border-radius: 5px; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { background: #2980b9; }
        #message { margin-top: 20px; font-weight: bold; color: #2c3e50; }
        footer { margin-top: 50px; font-size: 0.8rem; color: #7f8c8d; }
    </style>
</head>
<body>

    <header>
        <h1>Societe I-Tech</h1>
        <p>Expert en Solutions Informatiques & Systèmes Embarqués</p>
    </header>

    <div class="container">
        <h2>مرحباً بكم في موقعنا التفاعلي</h2>
        <p>نحن نقدم أفضل الحلول التقنية لتطوير أعمالكم.</p>
        
        <!-- زر تفاعلي -->
        <button class="btn" onclick="sayHello()">إضغط هنا للمزيد من المعلومات</button>
        
        <div id="message"></div>
    </div>

    <footer>
        &copy; 2026 Societe I-Tech - Built on GitHub Pages
    </footer>

    <script>
        /* JavaScript باش نخليو الموقع interactif */
        function sayHello() {
            const msg = document.getElementById('message');
            msg.innerHTML = "شكراً لاهتمامكم! فريق I-Tech سيتواصل معكم قريباً.";
            msg.style.color = "#27ae60";
            alert("شكراً على الضغط! هاد الزر دابا تفاعلي.");
        }
    </script>
</body>
</html>
