<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Societe I-Tech | Nos Spécialités</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: #f4f4f9; color: #333; transition: 0.3s; }
        header { background-image: url('Amine.jpg'); background-repeat: no-repeat; background-size: 100% 100%; height: 250px; width: 100%; }
        .page-body-content { padding: 40px 0; min-height: 80vh; }
        .section-intro { background: rgba(255, 255, 255, 0.9); padding: 30px; max-width: 900px; margin: 0 auto 40px auto; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .services-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 10px; width: 280px; padding: 25px; text-align: center; border-bottom: 5px solid #3498db; }
        .btn-action { background: #3498db; color: white; padding: 12px; border-radius: 5px; text-decoration: none; display: block; margin-top: 10px; }
        .btn-devis-final { display: inline-block; background: #27ae60; color: white; padding: 18px 45px; border-radius: 50px; text-decoration: none; }
        .footer-site { background-color: #2c3e50; color: white; padding: 40px; text-align: center; margin-top: 50px; }
        .lang-option { cursor: pointer; color: white; margin: 0 10px; text-decoration: none; }
        .lang-option img { width: 30px; display: block; margin: 0 auto 5px; }
    </style>
</head>
<body>

<header></header>

<div class="page-body-content">
    <div class="section-intro">
        <h2 data-lang="main-title">Votre Partenaire Technologique</h2>
        <p data-lang="main-desc">Nous fournissons les meilleures solutions de sécurité.</p>
    </div>

    <div class="services-container">
        <!-- يمكنك إضافة data-lang لكل بطاقة إذا أردت ترجمة النصوص التي بداخلها -->
        <div class="card">
            <i class="fas fa-camera" style="font-size:35px; color:#3498db;"></i>
            <h3>Surveillance</h3>
            <a href="devis.html" class="btn-action" data-lang="btn-more">En savoir plus</a>
        </div>
        <!-- ... يمكنك إضافة باقي البطاقات بنفس الطريقة -->
    </div>

    <div style="text-align: center;">
        <a href="#" class="btn-devis-final" data-lang="btn-devis">Demander un devis</a>
    </div>
</div>

<footer class="footer-site">
    <div class="language-switcher" style="display: flex; justify-content: center;">
        <a onclick="changeLanguage('ar')" class="lang-option"><img src="https://flagcdn.com/w40/ma.png">العربية</a>
        <a onclick="changeLanguage('fr')" class="lang-option"><img src="https://flagcdn.com/w40/fr.png">Français</a>
        <a onclick="changeLanguage('en')" class="lang-option"><img src="https://flagcdn.com/w40/gb.png">English</a>
    </div>
</footer>

<script>
    const translations = {
        'fr': {
            'main-title': 'Votre Partenaire Technologique',
            'main-desc': 'Nous fournissons les meilleures solutions de sécurité.',
            'btn-more': 'En savoir plus',
            'btn-devis': 'Demander un devis'
        },
        'ar': {
            'main-title': 'شريكك التكنولوجي',
            'main-desc': 'نحن نقدم أفضل حلول الأمان والحماية.',
            'btn-more': 'المزيد من التفاصيل',
            'btn-devis': 'طلب عرض سعر'
        },
        'en': {
            'main-title': 'Your Technology Partner',
            'main-desc': 'We provide the best security solutions.',
            'btn-more': 'Learn more',
            'btn-devis': 'Request a quote'
        }
    };

    function changeLanguage(lang) {
        document.querySelectorAll('[data-lang]').forEach(el => {
            const key = el.getAttribute('data-lang');
            if (translations[lang][key]) {
                el.innerText = translations[lang][key];
            }
        });
        document.body.style.direction = (lang === 'ar') ? 'rtl' : 'ltr';
    }
</script>

</body>
</html>
