<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Societe I-Tech | Nos Spécialités</title>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f9;
            color: #333;
        }
        header {
            background: #2c3e50;
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        .services-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease;
            border-bottom: 5px solid #3498db;
        }
        .card:hover {
            transform: translateY(-10px);
        }
        .card i {
            font-size: 40px;
            color: #3498db;
            margin-bottom: 20px;
        }
        .card h3 {
            margin: 10px 0;
            color: #2c3e50;
            font-size: 1.4rem;
        }
        .btn-action {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            width: 100%;
        }
        .btn-action:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

<header>
    <h1>Societe I-Tech</h1>
    <p>Solutions de Sécurité & Maintenance Informatique</p>
</header>

<div class="services-container">
    <!-- Service 1 -->
    <div class="card">
        <i class="fas fa-camera"></i>
        <h3>Surveillance caméra</h3>
        <p>متخصصون في كاميرات المراقبة</p>
        <button class="btn-action">Demander un devis</button>
    </div>

    <!-- Service 2 -->
    <div class="card">
        <i class="fas fa-fire"></i>
        <h3>Système incendie</h3>
        <p>أنظمة الكشف عن الحرائق</p>
        <button class="btn-action">Voir les options</button>
    </div>

    <!-- Service 3 -->
    <div class="card">
        <i class="fas fa-bell"></i>
        <h3>Système d'alarme</h3>
        <p>أنظمة الحماية والإنذار</p>
        <button class="btn-action">En savoir plus</button>
    </div>

    <!-- Service 4 -->
    <div class="card">
        <i class="fas fa-tools"></i>
        <h3>Vente et Réparation PC</h3>
        <p>بيع وإصلاح الحواسيب</p>
        <button class="btn-action">Service Technique</button>
    </div>

    <!-- Service 5 -->
    <div class="card">
        <i class="fas fa-network-wired"></i>
        <h3>Services réseau</h3>
        <p>تركيب وصيانة الشبكات</p>
        <button class="btn-action">Consulter un expert</button>
    </div>
</div>

</body>
</html>
