<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Societe I-Tech | Solutions Embarqués</title>
    <style>
        /* Fonts & Global Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: #333;
            background-color: #f4f7f6;
            text-align: center;
        }

        /* Modern Header */
        header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 4rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Container & Cards */
        .container {
            max-width: 900px;
            margin: -50px auto 20px;
            padding: 2rem;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .content-section {
            padding: 20px 0;
        }

        h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            display: inline-block;
            padding-bottom: 10px;
        }

        /* Professional Button */
        .btn {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 12px 30px;
            margin-top: 25px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.4);
        }

        #message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* Footer */
        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9rem;
            color: #7f8c8d;
            background: #eee;
        }
    </style>
</head>
<body>

    <header>
        <h1>Societe I-Tech</h1>
        <p>Expert en Solutions Informatiques & Systèmes Embarqués</p>
    </header>

    <div class="container">
        <div class="content-section">
            <h2>مرحباً بكم في موقعنا التفاعلي</h2>
            <p>نحن نقدم أفضل الحلول التقنية لتطوير أعمالكم بابتكار واحترافية.</p>
            
            <button class="btn" onclick="sayHello()">إضغط هنا للمزيد من المعلومات</button>
            <div id="message"></div>
        </div>
    </div>

    <footer>
        &copy; 2026 Societe I-Tech - Fès Shore, Maroc. Tous droits réservés.
    </footer>

    <script>
        function sayHello() {
            const msgDiv = document.getElementById('message');
            msgDiv.style.backgroundColor = '#e8f4fd';
            msgDiv.style.color = '#2c3e50';
            msgDiv.innerHTML = "شكراً لاهتمامكم! فريقنا مستعد لمواكبة مشاريعكم في الأنظمة المدمجة و IoT.";
        }
    </script>
</body>
</html>
